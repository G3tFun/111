<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настраиваемый плеер SwitchView</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { margin-bottom: 40px; }

        /* =========================================
           ОСНОВНЫЕ СТИЛИ ПЛЕЕРА (ВСТРОЕНЫ В КЛАСС)
           ========================================= */
        .sw-player-wrapper {
            /* Переменные по умолчанию (Темная тема) */
            --sw-accent: #ffffff;
            --sw-accent-invert: #000000;
            --sw-glass: rgba(20, 20, 20, 0.65);
            --sw-border: rgba(255, 255, 255, 0.15);
            --sw-hover: rgba(255, 255, 255, 0.15);
            --sw-text: #ffffff;
            --sw-text-muted: rgba(255, 255, 255, 0.6);
            --sw-bg: #000000;

            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Светлая тема */
        .sw-player-wrapper.theme-light {
            --sw-accent: #000000;
            --sw-accent-invert: #ffffff;
            --sw-glass: rgba(255, 255, 255, 0.75);
            --sw-border: rgba(0, 0, 0, 0.15);
            --sw-hover: rgba(0, 0, 0, 0.08);
            --sw-text: #000000;
            --sw-text-muted: rgba(0, 0, 0, 0.6);
            --sw-bg: #f0f0f0;
        }

        .sw-player-card {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--sw-bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            transition: border-radius 0.3s ease;
            color: var(--sw-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .sw-player-card.idle { cursor: none; }

        .sw-player-card:fullscreen, .sw-player-card.pseudo-fullscreen {
            width: 100vw !important;
            max-width: none !important;
            height: 100vh;
            border-radius: 0;
            position: fixed;
            top: 0; left: 0;
            z-index: 9999;
            box-shadow: none;
        }

        .sw-video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .sw-player-card.idle .sw-video { cursor: none; }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .sw-glass-dock {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            width: calc(100% - 60px);
            max-width: 750px; height: 70px;
            background: var(--sw-glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--sw-border);
            border-radius: 24px;
            display: flex; align-items: center; 
            padding: 0 20px; gap: 20px;
            box-sizing: border-box;
            opacity: 0; transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            z-index: 100; pointer-events: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .sw-player-card:not(.is-fullscreen).show-controls .sw-glass-dock,
        .sw-player-card:not(.is-fullscreen):hover:not(.idle) .sw-glass-dock,
        .sw-player-card.is-fullscreen.is-paused .sw-glass-dock {
            opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto;
        }

        .sw-player-card.idle .sw-glass-dock,
        .sw-player-card.idle .sw-settings-menu,
        .sw-player-card.idle .sw-context-menu {
            opacity: 0 !important; transform: translateY(20px); pointer-events: none !important;
        }
        .sw-player-card.idle .sw-settings-menu { transform: translateY(10px) scale(0.95); }

        /* КНОПКИ */
        .sw-icon-btn {
            width: 44px; height: 44px;
            background: var(--sw-accent);
            border-radius: 16px; border: none;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
        }
        .sw-icon-btn:hover { transform: scale(1.1); }
        .sw-icon-btn:active { transform: scale(0.95); }
        .sw-icon-btn svg { width: 22px; height: 22px; fill: var(--sw-accent-invert); }

        .sw-secondary-btn { background: transparent; border: 1px solid var(--sw-border); }
        .sw-secondary-btn svg { fill: var(--sw-text); }
        .sw-secondary-btn:hover { background: var(--sw-hover); }

        /* ТАЙМЛАЙН */
        .sw-timeline-container {
            flex-grow: 1; height: 8px;
            background: var(--sw-border);
            border-radius: 10px; cursor: pointer;
            position: relative; transition: height 0.2s;
        }
        .sw-timeline-container:hover { height: 10px; }
        
        .sw-progress {
            height: 100%; width: 0%;
            background: var(--sw-accent);
            border-radius: 10px; position: relative; pointer-events: none;
        }

        .sw-time-island {
            position: absolute; top: -45px; left: 0;
            transform: translateX(-50%) scale(0.8); opacity: 0;
            background: var(--sw-accent); color: var(--sw-accent-invert);
            padding: 6px 14px; border-radius: 12px;
            font-size: 13px; font-weight: 700; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s, left 0.05s linear;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .sw-timeline-container:hover .sw-time-island { opacity: 1; transform: translateX(-50%) scale(1); }
        .sw-time-label { font-size: 14px; font-weight: 600; opacity: 0.9; min-width: 48px; text-align: center; font-variant-numeric: tabular-nums; color: var(--sw-text); }

        /* МЕНЮ */
        .sw-settings-menu, .sw-context-menu {
            position: absolute;
            background: var(--sw-glass); color: var(--sw-text);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--sw-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: none; flex-direction: column;
            z-index: 1000;
        }
        
        .sw-settings-menu {
            bottom: 110px; right: 30px; width: 240px; border-radius: 20px; padding: 12px;
            transform-origin: bottom right; overflow: hidden;
        }
        .sw-settings-menu.active { display: flex; animation: swMenuOpen 0.3s cubic-bezier(0.2, 1, 0.2, 1); }

        .sw-context-menu {
            width: 220px; border-radius: 18px; padding: 8px; z-index: 2000; transform-origin: top left;
        }
        .sw-context-menu.active { display: flex; animation: swCtxOpen 0.2s ease-out forwards; }

        .sw-menu-page { display: none; flex-direction: column; gap: 4px; }
        .sw-menu-page.active { display: flex; }

        .sw-menu-item {
            padding: 12px 14px; border-radius: 12px;
            cursor: pointer; font-size: 14px; font-weight: 500;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s; user-select: none;
        }
        .sw-menu-item:hover { background: var(--sw-hover); }
        .sw-menu-item span.val { color: var(--sw-text-muted); font-size: 12px; }
        .sw-menu-item.selected::after { content: '●'; font-size: 10px; color: var(--sw-accent); margin-left: 8px; }

        .sw-menu-header {
            padding: 6px 14px 12px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--sw-text-muted); border-bottom: 1px solid var(--sw-border);
            margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer;
            transition: color 0.2s;
        }
        .sw-menu-header:hover { color: var(--sw-text); }
        .sw-divider { height: 1px; background: var(--sw-border); margin: 6px 10px; }

        .sw-context-brand {
            padding: 12px 14px; font-size: 16px; font-weight: 800;
            color: var(--sw-accent); text-decoration: none; display: flex;
            align-items: center; justify-content: center; border-radius: 12px;
            background: var(--sw-hover); margin-bottom: 6px; transition: opacity 0.2s, transform 0.2s;
        }
        .sw-context-brand:hover { opacity: 0.8; transform: scale(0.98); }

        @keyframes swMenuOpen { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes swCtxOpen { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <h1>Демонстрация плееров</h1>

    <!-- Контейнер для первого плеера (Темный) -->
    <div id="player-container-1"></div>
    <br><br>
    <!-- Контейнер для второго плеера (Светлый) -->
    <div id="player-container-2"></div>

<script>
    /**
     * Инкапсулированный класс плеера SwitchView
     */
    class SwitchViewPlayer {
        constructor(config) {
            this.containerId = config.containerId;
            this.size = config.playerSize || '950px';
            this.theme = config.playerTheme || 'dark';
            this.showFullscreen = config.fullscreenButton !== false;
            this.allowRepeat = config.allowRepeatModeButton !== false;
            this.qualities = config.availableQualities || { "Default": "" };
            
            // Определяем начальное качество (первое из списка)
            this.currentQualityLabel = Object.keys(this.qualities)[0];
            this.currentSrc = this.qualities[this.currentQualityLabel];

            this.isDragging = false;
            this.idleTimer = null;

            this.initDOM();
            this.bindElements();
            this.attachEvents();
        }

        initDOM() {
            const rootContainer = document.getElementById(this.containerId);
            if (!rootContainer) return;

            // Генерация HTML
            rootContainer.innerHTML = `
                <div class="sw-player-wrapper ${this.theme === 'light' ? 'theme-light' : ''}" style="max-width: ${this.size};">
                    <div class="sw-player-card">
                        <video class="sw-video" src="${this.currentSrc}" playsinline></video>

                        <div class="sw-context-menu">
                            <a href="https://switchview0.vercel.app" target="_blank" class="sw-context-brand">SwitchView</a>
                            <div class="sw-menu-item ctx-play-toggle">Воспроизвести</div>
                            ${this.allowRepeat ? `<div class="sw-menu-item ctx-repeat">Повтор: <span class="ctx-repeat-status">Выкл</span></div>` : ''}
                            <div class="sw-divider"></div>
                            <div class="sw-menu-item ctx-pip">Картинка в картинке</div>
                            <div class="sw-menu-item ctx-copy">Копировать URL видео</div>
                        </div>

                        <div class="sw-settings-menu">
                            <div class="sw-menu-page active" data-page="main">
                                <div class="sw-menu-header">Настройки</div>
                                <div class="sw-menu-item nav-speed">Скорость <span class="val speed-val">Обычная</span></div>
                                <div class="sw-menu-item nav-quality">Качество <span class="val quality-val">${this.currentQualityLabel}</span></div>
                                ${this.allowRepeat ? `<div class="sw-menu-item nav-repeat">Повтор <span class="val repeat-val">Выкл</span></div>` : ''}
                            </div>

                            <div class="sw-menu-page" data-page="speed">
                                <div class="sw-menu-header nav-back">← Скорость</div>
                                <div class="sw-menu-item set-speed" data-val="0.5">0.5x</div>
                                <div class="sw-menu-item set-speed selected" data-val="1">Обычная</div>
                                <div class="sw-menu-item set-speed" data-val="1.5">1.5x</div>
                                <div class="sw-menu-item set-speed" data-val="2">2x</div>
                            </div>

                            <div class="sw-menu-page" data-page="quality">
                                <div class="sw-menu-header nav-back">← Качество</div>
                                ${Object.keys(this.qualities).map(q => `
                                    <div class="sw-menu-item set-quality ${q === this.currentQualityLabel ? 'selected' : ''}" data-label="${q}">
                                        ${q}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="sw-glass-dock">
                            <button class="sw-icon-btn play-btn">
                                <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>

                            <div class="sw-timeline-container">
                                <div class="sw-progress"></div>
                                <div class="sw-time-island">0:00</div>
                            </div>

                            <div class="sw-time-label">0:00</div>

                            <button class="sw-icon-btn sw-secondary-btn settings-btn">
                                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            </button>

                            ${this.showFullscreen ? `
                            <button class="sw-icon-btn sw-secondary-btn fullscreen-btn">
                                <svg class="fullscreen-icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                            </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            this.root = rootContainer.querySelector('.sw-player-card');
        }

        bindElements() {
            this.v = this.root.querySelector('.sw-video');
            this.glassDock = this.root.querySelector('.sw-glass-dock');
            this.playBtn = this.root.querySelector('.play-btn');
            this.playIcon = this.root.querySelector('.play-icon');
            this.progress = this.root.querySelector('.sw-progress');
            this.timeline = this.root.querySelector('.sw-timeline-container');
            this.island = this.root.querySelector('.sw-time-island');
            this.timer = this.root.querySelector('.sw-time-label');
            this.settingsBtn = this.root.querySelector('.settings-btn');
            this.fullscreenBtn = this.root.querySelector('.fullscreen-btn');
            this.fullscreenIcon = this.root.querySelector('.fullscreen-icon');
            this.menu = this.root.querySelector('.sw-settings-menu');
            this.contextMenu = this.root.querySelector('.sw-context-menu');
            this.ctxPlayToggle = this.root.querySelector('.ctx-play-toggle');
        }

        attachEvents() {
            if (this.v.paused) this.root.classList.add('is-paused');

            // --- УМНАЯ ЛОГИКА ОТОБРАЖЕНИЯ ИНТЕРФЕЙСА ---
            const resetIdle = () => this.resetIdleTimer();
            ['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(evt => {
                this.root.addEventListener(evt, resetIdle);
            });

            this.root.addEventListener('mouseleave', () => {
                if (!this.v.paused && !this.menu.classList.contains('active') && !this.contextMenu.classList.contains('active')) {
                    clearTimeout(this.idleTimer);
                    this.root.classList.add('idle');
                    this.root.classList.remove('show-controls');
                }
            });

            // --- УПРАВЛЕНИЕ ---
            this.playBtn.onclick = (e) => { e.stopPropagation(); this.togglePlay(); };
            this.v.onclick = (e) => { if(!this.menu.contains(e.target) && !this.contextMenu.contains(e.target)) this.togglePlay(); };
            
            this.v.onplay = () => {
                this.playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                this.ctxPlayToggle.innerText = "Пауза";
                this.root.classList.remove('is-paused');
                this.resetIdleTimer();
            };
            this.v.onpause = () => {
                this.playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                this.ctxPlayToggle.innerText = "Воспроизвести";
                this.root.classList.add('is-paused');
                this.resetIdleTimer();
            };

            // --- ТАЙМЛАЙН ---
            this.v.ontimeupdate = () => {
                if (!this.isDragging) {
                    const pct = (this.v.currentTime / this.v.duration) * 100;
                    this.progress.style.width = (isNaN(pct) ? 0 : pct) + '%';
                }
                this.timer.innerText = this.formatTime(this.v.currentTime);
            };

            this.timeline.addEventListener('mousedown', (e) => {
                e.stopPropagation(); this.isDragging = true;
                this.v.currentTime = this.updateTimeline(e) * this.v.duration;
            });

            const onMouseMove = (e) => {
                if (this.isDragging) {
                    this.v.currentTime = this.updateTimeline(e) * this.v.duration;
                    this.island.style.transform = `translateX(-50%) rotate(0deg) scale(1)`;
                    this.island.style.opacity = '1';
                }
            };
            const onMouseUp = () => { if (this.isDragging) { this.isDragging = false; this.island.style.opacity = '0'; } };
            
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);

            this.timeline.onmousemove = (e) => {
                if (!this.isDragging) {
                    this.updateTimeline(e);
                    const tilt = Math.min(Math.max(e.movementX * 1.5, -15), 15);
                    this.island.style.transform = `translateX(-50%) rotate(${tilt}deg) scale(1)`;
                }
            };
            this.timeline.onmouseleave = () => { if (!this.isDragging) this.island.style.transform = `translateX(-50%) rotate(0deg) scale(0.8)`; };

            // --- НАСТРОЙКИ ---
            this.settingsBtn.onclick = (e) => {
                e.stopPropagation(); this.contextMenu.classList.remove('active');
                this.menu.classList.toggle('active');
                this.showPage('main'); this.resetIdleTimer();
            };

            // Делегация событий меню
            this.menu.addEventListener('click', (e) => {
                e.stopPropagation();
                if (e.target.closest('.nav-speed')) this.showPage('speed');
                if (e.target.closest('.nav-quality')) this.showPage('quality');
                if (e.target.closest('.nav-repeat')) this.toggleRepeat();
                if (e.target.closest('.nav-back')) this.showPage('main');
                
                const speedOpt = e.target.closest('.set-speed');
                if (speedOpt) this.setSpeed(parseFloat(speedOpt.dataset.val), speedOpt.innerText);

                const qualOpt = e.target.closest('.set-quality');
                if (qualOpt) this.setQuality(qualOpt.dataset.label);
            });

            // --- КОНТЕКСТНОЕ МЕНЮ ---
            this.root.oncontextmenu = (e) => {
                e.preventDefault(); 
                const rect = this.root.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;

                this.ctxPlayToggle.innerText = this.v.paused ? "Воспроизвести" : "Пауза";
                this.contextMenu.style.left = `${x}px`; this.contextMenu.style.top = `${y}px`;
                this.menu.classList.remove('active'); this.contextMenu.classList.add('active');

                // Корректировка выхода за края
                setTimeout(() => {
                    const menuRect = this.contextMenu.getBoundingClientRect();
                    if (x + menuRect.width > rect.width) this.contextMenu.style.left = `${x - menuRect.width}px`;
                    if (y + menuRect.height > rect.height) this.contextMenu.style.top = `${y - menuRect.height}px`;
                }, 0);
                this.resetIdleTimer();
            };

            this.contextMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                if (e.target.closest('.ctx-play-toggle')) this.togglePlay();
                if (e.target.closest('.ctx-repeat')) this.toggleRepeat();
                if (e.target.closest('.ctx-pip')) this.enablePiP();
                if (e.target.closest('.ctx-copy')) this.copyVideoLink();
                if (!e.target.closest('.sw-context-brand')) this.contextMenu.classList.remove('active');
            });

            // --- ПОЛНОЭКРАННЫЙ РЕЖИМ ---
            if (this.showFullscreen) {
                this.fullscreenBtn.onclick = (e) => { e.stopPropagation(); this.toggleFullScreen(); };
                document.addEventListener('fullscreenchange', () => this.handleFullscreenChange());
            }

            // Закрытие меню кликом вне
            window.addEventListener('mousedown', (e) => {
                if (!this.menu.contains(e.target) && !this.settingsBtn.contains(e.target)) this.menu.classList.remove('active');
                if (!this.contextMenu.contains(e.target)) this.contextMenu.classList.remove('active');
            });

            this.resetIdleTimer();
        }

        // Вспомогательные методы
        resetIdleTimer() {
            this.root.classList.remove('idle');
            this.root.classList.add('show-controls');
            clearTimeout(this.idleTimer);
            if (!this.v.paused) {
                this.idleTimer = setTimeout(() => {
                    if (!this.menu.classList.contains('active') && !this.contextMenu.classList.contains('active') && !this.isDragging) {
                        this.root.classList.add('idle');
                        this.root.classList.remove('show-controls');
                    }
                }, 2500);
            }
        }

        togglePlay() {
            if (this.v.paused) this.v.play(); else this.v.pause();
            this.contextMenu.classList.remove('active'); this.resetIdleTimer();
        }

        updateTimeline(e) {
            const rect = this.timeline.getBoundingClientRect();
            let pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            this.progress.style.width = (pct * 100) + '%';
            this.island.style.left = (pct * 100) + '%';
            this.island.innerText = this.formatTime(pct * this.v.duration);
            return pct;
        }

        formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        showPage(pageId) {
            this.root.querySelectorAll('.sw-menu-page').forEach(p => p.classList.remove('active'));
            this.root.querySelector(`.sw-menu-page[data-page="${pageId}"]`).classList.add('active');
        }

        setSpeed(rate, label) {
            this.v.playbackRate = rate;
            this.root.querySelector('.speed-val').innerText = label;
            this.updateSelection('.set-speed', label);
            setTimeout(() => this.showPage('main'), 200);
        }

        setQuality(label) {
            if (label === this.currentQualityLabel) return;
            
            const newSrc = this.qualities[label];
            if (!newSrc) return;

            // Запоминаем статус
            const currentTime = this.v.currentTime;
            const wasPaused = this.v.paused;

            // Обновляем UI
            this.currentQualityLabel = label;
            this.root.querySelector('.quality-val').innerText = label;
            this.updateSelection('.set-quality', label, true);
            setTimeout(() => this.showPage('main'), 200);

            // Меняем сорс
            this.v.src = newSrc;
            
            // Восстанавливаем время после загрузки метаданных
            this.v.addEventListener('loadedmetadata', () => {
                this.v.currentTime = currentTime;
                if (!wasPaused) this.v.play();
            }, { once: true });
        }

        toggleRepeat() {
            if (!this.allowRepeat) return;
            this.v.loop = !this.v.loop;
            const val = this.v.loop ? 'Вкл' : 'Выкл';
            this.root.querySelector('.repeat-val').innerText = val;
            this.root.querySelector('.ctx-repeat-status').innerText = val;
            this.contextMenu.classList.remove('active');
        }

        updateSelection(selector, val, isDataLabel = false) {
            this.root.querySelectorAll(selector).forEach(item => {
                item.classList.remove('selected');
                const check = isDataLabel ? item.dataset.label : item.innerText;
                if(check.includes(val)) item.classList.add('selected');
            });
        }

        enablePiP() {
            if (document.pictureInPictureEnabled) this.v.requestPictureInPicture();
            this.contextMenu.classList.remove('active');
        }

        copyVideoLink() {
            navigator.clipboard.writeText(this.v.src).catch(() => {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy); dummy.value = this.v.src;
                dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
            });
            this.contextMenu.classList.remove('active');
        }

        handleFullscreenChange() {
            if (!this.showFullscreen) return;
            const isFull = !!document.fullscreenElement;
            this.fullscreenIcon.innerHTML = isFull 
                ? '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
                : '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            
            this.root.classList.toggle('is-fullscreen', isFull);
            if (!isFull) this.root.classList.remove('pseudo-fullscreen');
        }

        toggleFullScreen() {
            const isPseudo = this.root.classList.contains('pseudo-fullscreen');
            if (!document.fullscreenElement && !isPseudo) {
                if (this.root.requestFullscreen) {
                    this.root.requestFullscreen().catch(() => this.fallbackFullscreen());
                } else this.fallbackFullscreen();
            } else {
                if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
                else if (isPseudo) {
                    this.root.classList.remove('pseudo-fullscreen', 'is-fullscreen');
                    this.handleFullscreenChange();
                }
            }
            this.menu.classList.remove('active'); this.contextMenu.classList.remove('active');
        }

        fallbackFullscreen() {
            this.root.classList.add('pseudo-fullscreen', 'is-fullscreen');
            this.fullscreenIcon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
        }
    }

    // ==========================================
    // ПРИМЕР ИСПОЛЬЗОВАНИЯ (ИНИЦИАЛИЗАЦИЯ)
    // ==========================================

    // Плеер 1: Темная тема, полнофункциональный
    new SwitchViewPlayer({
        containerId: 'player-container-1',
        playerSize: '800px',
        playerTheme: 'dark', 
        fullscreenButton: true,
        allowRepeatModeButton: true,
        availableQualities: {
            "1080p": "https://www.w3schools.com/html/mov_bbb.mp4",
            "480p": "https://www.w3schools.com/html/mov_bbb.mp4" // Здесь должна быть ссылка на 480p версию
        }
    });

    // Плеер 2: Светлая тема, урезанный функционал, другой размер
    new SwitchViewPlayer({
        containerId: 'player-container-2',
        playerSize: '600px',
        playerTheme: 'light', 
        fullscreenButton: false, // скрыли кнопку полного экрана
        allowRepeatModeButton: false, // скрыли кнопку повтора
        availableQualities: {
            "720p": "https://www.w3schools.com/html/mov_bbb.mp4"
        }
    });

</script>
